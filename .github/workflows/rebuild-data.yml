name: Rebuild generated artist data

on:
  workflow_dispatch:
    inputs:
      registry_offset:
        description: "Candidate registry offset"
        required: false
        default: "0"
      registry_limit:
        description: "Number of candidate artists to import"
        required: false
        default: "10"
  schedule:
    - cron: "17 5 1 * *"

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/import-wikidata.mjs
      - run: node scripts/import-wikidata.mjs --registry ${{ inputs.registry_offset || 0 }} ${{ inputs.registry_limit || 10 }}
      - run: cp generated-data/*.json data/
      - run: node scripts/validate-data.mjs
      - name: Commit refreshed records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "Refresh generated artist data"
          git push
